// SHIFT connector protocol v1 (ADR-0007).
//
// Record batches cross as opaque frames encoded with the engine's binary
// value codec — protobuf never sees individual records.
syntax = "proto3";

package shift.connector.v1;

option go_package = "github.com/aaron-au/shift/sdk/connectorpb";

service Connector {
  // Handshake verifies the host token and negotiates protocol version.
  // It is the readiness probe: hosts retry it until the socket serves.
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);

  // Health reports liveness of the connector process.
  rpc Health(HealthRequest) returns (HealthResponse);

  // Describe reports the connector's actions and their config schemas.
  // Called by the publisher tooling at publish time to extract a signed
  // descriptor (ADR-0018); not on the execution hot path.
  rpc Describe(DescribeRequest) returns (DescribeResponse);

  // Pull streams batches from a source action until exhausted.
  rpc Pull(PullRequest) returns (stream Frame);

  // Push streams batches into a sink action. The first message must be
  // the Open control message; frames follow.
  rpc Push(stream PushMessage) returns (PushSummary);

  // Shutdown asks the connector to terminate gracefully.
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

message HandshakeRequest {
  // Protocol versions the host can speak, ascending.
  repeated uint32 protocol_versions = 1;
}

message HandshakeResponse {
  // The version the connector selected from the offered set.
  uint32 protocol_version = 1;
  string name = 2;
  string version = 3;
  // Action names this connector exposes.
  repeated string source_actions = 4;
  repeated string sink_actions = 5;
}

message DescribeRequest {}

message DescribeResponse {
  string name = 1;
  string version = 2;
  repeated ActionSchema actions = 3;
  // Optional marketplace discovery metadata (M6e). Absent leaves the
  // descriptor byte-identical to a metadata-free one (ADR-0018 parity).
  ConnectorMeta meta = 4;
}

// ConnectorMeta is optional discovery metadata (M6e): human description,
// category, icon (emoji/glyph), free-form tags, docs URL. Descriptive only.
message ConnectorMeta {
  string description = 1;
  string category = 2;
  string icon = 3;
  repeated string tags = 4;
  string docs_url = 5;
}

// ActionSchema describes one action's config document.
message ActionSchema {
  string action = 1;
  // "source" or "sink".
  string direction = 2;
  // JSON Schema (draft-07 subset) for this action's config; empty when
  // the connector declares none (builder falls back to a raw JSON editor).
  bytes config_schema = 3;
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  string detail = 2;
}

message PullRequest {
  string action = 1;
  // Connector-specific configuration document (JSON).
  bytes config = 2;
}

// Frame carries one encoded record batch.
message Frame {
  // Batch payload: length-delimited sequence of values in the SHIFT
  // binary value encoding (engine/spill codec).
  bytes payload = 1;
  // Record count in this frame (redundant with payload; lets hosts
  // meter without decoding).
  int64 records = 2;
}

message PushMessage {
  oneof msg {
    PushOpen open = 1;
    Frame frame = 2;
  }
}

message PushOpen {
  string action = 1;
  bytes config = 2;
}

message PushSummary {
  int64 records = 1;
}

message ShutdownRequest {}

message ShutdownResponse {}
