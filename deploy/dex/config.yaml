# Dex for the "just runs" bundle: file-provisioned OIDC IdP — nothing
# manual, no external accounts. Replace with any OIDC-compliant IdP in
# production (the hub only needs issuer + client id/secret).
issuer: http://dex:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  passwordConnector: local
  skipApprovalScreen: true

staticClients:
  - id: shift-hub
    name: SHIFT Hub
    # Dev-bundle-only value; rotate for any deployment that leaves a laptop.
    secret: shift-dev-client-secret
    redirectURIs:
      - https://localhost:8400/auth/callback

enablePasswordDB: true
staticPasswords:
  - email: admin@example.com
    # bcrypt of "password" — dev bundle only.
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: admin
    userID: 08a8684b-db88-4b73-90a9-3cd1661f5466
